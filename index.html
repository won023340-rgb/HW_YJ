<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>여주청년 이혜원</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f2f2f7; -webkit-tap-highlight-color: transparent; }
        .bento-card {
            background: white;
            border-radius: 2.5rem;
            transition: transform 0.2s ease;
            border: 1px solid rgba(0,0,0,0.03);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        /* [수정] 영상 사이즈를 다시 가로/정사각형 비율로 고정 */
        .video-horizontal {
            width: 100%;
            aspect-ratio: 1 / 1; /* 이전의 큼직한 정사각형 사이즈 유지 */
            max-width: 1152px;
        }
        .bento-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 flex flex-col items-center" onclick="unlockAudioContext()">

    <div class="w-full max-w-[500px] md:max-w-[1152px] space-y-6 md:space-y-10 flex flex-col items-center">
        
        <div class="bento-card video-horizontal bg-black border-none" onclick="handleSound(event)">
            <video id="topVideo" src="main-bg.mp4" autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover"></video>
            
            <div id="muteBtn" class="absolute top-6 right-6 z-30 bg-white/95 text-gray-900 px-6 py-3 rounded-full font-black shadow-2xl flex items-center gap-2 text-lg transition-all">
                <span id="muteIcon">🔇</span> <span id="muteText">소리 켜기</span>
            </div>
            
            <div id="clickGuide" class="absolute inset-0 flex items-center justify-center bg-black/20 z-10 pointer-events-none">
                <p class="text-white text-lg font-bold bg-black/40 px-6 py-3 rounded-2xl backdrop-blur-md">클릭하면 소리가 나옵니다</p>
            </div>
        </div>

        <div class="bento-card p-10 flex flex-col items-center text-center w-full">
            <div class="text-7xl mb-6">💼</div>
            <h3 class="font-black text-5xl text-gray-900 mb-8 tracking-tighter">실무 전문가</h3>
            <div class="space-y-6">
                <p class="text-blue-600 font-black text-3xl leading-tight">더불어민주당<br>여주양평 사무차장</p>
                <div class="text-gray-500 text-2xl font-bold space-y-3 pt-4 border-t border-gray-100">
                    <p>현) 민주평통 여주시 청년위원장</p>
                    <p>전) 21대 대선 여주 회계책임자</p>
                    <p>전) 푸르메재단 무이숲 재무팀</p>
                </div>
            </div>
        </div>

        <div class="bento-card bg-[#111827] text-white p-10 w-full">
            <h3 class="font-black text-5xl text-blue-500 mb-10 text-center tracking-tighter">핵심 역량</h3>
            <div class="space-y-8">
                <div class="border-l-4 border-blue-500 pl-5">
                    <span class="text-3xl font-black block">회계 전문성</span>
                    <p class="text-blue-300 text-xl font-bold mt-1">숫자로 책임을 증명합니다.</p>
                </div>
                <div class="border-l-4 border-blue-500 pl-5">
                    <span class="text-3xl font-black block">예산 관리</span>
                    <p class="text-blue-300 text-xl font-bold mt-1">세금의 흐름을 바로잡습니다.</p>
                </div>
                <div class="border-l-4 border-blue-500 pl-5">
                    <span class="text-3xl font-black block">청년 정책</span>
                    <p class="text-blue-300 text-xl font-bold mt-1">떠나지 않아도 되는 여주</p>
                </div>
            </div>
        </div>

        <div class="w-full space-y-4">
            <a href="https://www.facebook.com/profile.php?id=61582088739118" target="_blank" class="bento-card bg-[#1877F2] text-white py-8 flex flex-row items-center justify-center gap-4 border-none shadow-xl">
                <span class="text-4xl">🔵</span>
                <span class="text-3xl font-black">FACEBOOK</span>
            </a>
            <a href="https://www.youtube.com/@%EC%9D%B4%ED%98%9C%EC%9B%90TV" target="_blank" class="bento-card bg-blue-600 text-white py-8 flex flex-row items-center justify-center gap-4 border-none shadow-xl">
                <span class="text-4xl">🔴</span>
                <span class="text-3xl font-black">이혜원TV</span>
            </a>
        </div>

        <footer class="text-center py-16 text-gray-400 text-sm font-black tracking-widest opacity-50">
            © 2026 LEE HYE-WON. ALL RIGHTS RESERVED.
        </footer>
    </div>

    <script>
        const video = document.getElementById('topVideo');
        const icon = document.getElementById('muteIcon');
        const text = document.getElementById('muteText');
        const btn = document.getElementById('muteBtn');
        const guide = document.getElementById('clickGuide');

        function unlockAudioContext() {
            video.play();
            document.getElementById('secondVideo').play();
        }

        function handleSound(event) {
            if (video.muted) {
                video.muted = false;
                video.volume = 1.0;
                video.play();
                icon.innerText = "🔊";
                text.innerText = "소리 끄기";
                btn.classList.replace('bg-white/95', 'bg-blue-600');
                btn.classList.add('text-white');
                guide.style.display = 'none';
            } else {
                video.muted = true;
                icon.innerText = "🔇";
                text.innerText = "소리 켜기";
                btn.classList.replace('bg-blue-600', 'bg-white/95');
                btn.classList.remove('text-white');
            }
        }
    </script>
</body>
</html>
